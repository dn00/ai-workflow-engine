<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Workflow Engine{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #333; max-width: 960px; margin: 0 auto; padding: 1rem; }
        nav { background: #1a1a2e; color: #fff; padding: 0.75rem 1rem; margin: -1rem -1rem 1.5rem; }
        nav a { color: #fff; text-decoration: none; font-weight: 600; font-size: 1.1rem; }
        nav a:hover { text-decoration: underline; }
        h1, h2, h3 { margin-bottom: 0.5rem; }
        .content { padding: 0 0.5rem; }
        .error { background: #fee; border: 1px solid #c00; padding: 1rem; border-radius: 4px; color: #900; }
    </style>
</head>
<body>
    <nav>
        <a href="/ui/intake">AI Workflow Engine</a>
    </nav>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
